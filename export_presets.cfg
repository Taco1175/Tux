; Godot 4 export presets for TUX
; After installing Godot 4.3, download export templates:
;   Editor → Manage Export Templates → Download

[preset.0]

name="Windows Desktop"
platform="Windows Desktop"
runnable=true
advanced_options=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="export/windows/TUX.exe"
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false

[preset.0.options]

custom_template/debug=""
custom_template/release=""
debug/export_console_wrapper=1
binary_format/embed_pck=true
texture_format/bptc=true
texture_format/s3tc=true
texture_format/etc=false
texture_format/etc2=false
binary_format/architecture="x86_64"
codesign/enable=false
codesign/timestamp=true
codesign/timestamp_server_url=""
codesign/digest_algorithm=1
codesign/description=""
codesign/custom_options=PackedStringArray()
application/modify_resources=true
application/icon="res://assets/sprites/ui/icon.png"
application/console_wrapper_icon="res://assets/sprites/ui/icon.png"
application/icon_interpolation=4
application/file_version=""
application/product_version=""
application/company_name=""
application/product_name="TUX"
application/file_description=""
application/copyright=""
application/trademarks=""
application/export_angle=0
application/export_d3d12=0
application/d3d12_agility_sdk_multiarch=true
ssh_remote_deploy/enabled=false
ssh_remote_deploy/host="user@host"
ssh_remote_deploy/port="22"
ssh_remote_deploy/extra_args_ssh=""
ssh_remote_deploy/extra_args_scp=""
ssh_remote_deploy/run_script="#!/usr/bin/env bash\nexport DISPLAY=:0\nexport WAYLAND_DISPLAY=wayland-0\n\nif command -v wine &> /dev/null;\n\tthen wine start \"{temp_dir}\\\\{exe_name}\" {cmd_args}\nelif command -v wine64 &> /dev/null;\n\tthen wine64 start \"{temp_dir}\\\\{exe_name}\" {cmd_args}\nfi\n"
ssh_remote_deploy/cleanup_script="#!/usr/bin/env bash\nkill $(pgrep -x wine) || true\nkill $(pgrep -x wine64) || true\nrm -rf {temp_dir}"

